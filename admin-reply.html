<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reponse Client | Oriel Studio</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1620; color:#eaf2f8; margin:0; }
    .wrap { max-width:760px; margin:32px auto; padding:0 16px; }
    .card { background:#112230; border:1px solid #294659; border-radius:14px; padding:18px; }
    h1 { margin:0 0 10px; font-size:24px; }
    p { color:#bcd2df; }
    .grid { display:grid; gap:10px; }
    label { display:grid; gap:6px; font-weight:700; font-size:14px; }
    input, textarea, select { width:100%; border:1px solid #3f6177; background:#0a141d; color:#eaf2f8; border-radius:10px; padding:10px; font:inherit; }
    button { border:0; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; background:linear-gradient(120deg,#f27d36,#ffd34d); color:#12212a; }
    .msg { min-height:22px; margin-top:10px; color:#d8ebf5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Reponse personnalisee client</h1>
      <p>Utilise ce formulaire pour poser des questions, ajuster ton prix, ou confirmer/refuser proprement.</p>
      <form id="reply-form" class="grid">
        <label>Action
          <select name="action">
            <option value="custom">Message personnalise</option>
            <option value="accept">Accepter</option>
            <option value="refuse">Refuser</option>
          </select>
        </label>
        <label>Proposition budgetaire (optionnel)
          <input type="text" name="price" placeholder="Ex: 2 400 EUR + maintenance mensuelle" />
        </label>
        <label>Questions supplementaires (optionnel)
          <textarea name="questions" rows="4" placeholder="Ex: Quel volume de produits ? Avez-vous un logo HD ?"></textarea>
        </label>
        <label>Message principal (recommande en mode personnalise)
          <textarea name="message" rows="5" placeholder="Ex: Merci pour votre demande. Voici mes recommandations..."></textarea>
        </label>
        <button type="submit">Envoyer la reponse au client</button>
      </form>
      <p id="status" class="msg"></p>
    </div>
  </div>
  <script>
    const form = document.getElementById("reply-form");
    const statusNode = document.getElementById("status");
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!token) {
        statusNode.textContent = "Token manquant.";
        return;
      }
      const data = new FormData(form);
      const payload = {
        token,
        action: data.get("action"),
        price: data.get("price"),
        questions: data.get("questions"),
        message: data.get("message")
      };
      statusNode.textContent = "Envoi en cours...";
      try {
        const response = await fetch("/api/respond", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          statusNode.textContent = "Echec de l'envoi. Verifie les variables serveur.";
          return;
        }
        statusNode.textContent = "Email client envoye avec succes.";
        form.reset();
      } catch (_error) {
        statusNode.textContent = "Erreur reseau pendant l'envoi.";
      }
    });
  </script>
</body>
</html>
